name: Sync recent analyses

on:
  workflow_dispatch:
  # Uncomment after the site is deployed at keepsecure.io:
  # schedule:
  #   - cron: '0 6 * * 1'  # weekly, Mondays at 06:00 UTC

permissions:
  contents: write

concurrency:
  group: sync-recent
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch hub feed
        run: |
          curl -sSfL https://keepsecure.io/hub.json -o /tmp/hub.json
          jq '.posts | length' /tmp/hub.json

      - name: Build new table section
        run: |
          ROWS=$(jq -r '
            [.posts[] | select(.artifactsUrl != null)]
            | .[0:5]
            | map("| \(.cve // "—") | \(.title) | [Read](\(.hubUrl)) | [Folder](\(.artifactsUrl)) |")
            | .[]
          ' /tmp/hub.json)

          {
            echo "<!-- recent-analyses:start -->"
            echo "| CVE | Summary | Hub | Artifacts |"
            echo "|-----|---------|-----|-----------|"
            if [ -z "$ROWS" ]; then
              echo "| *First published artifact set will appear here.* | | | |"
            else
              echo "$ROWS"
            fi
            echo "<!-- recent-analyses:end -->"
          } > /tmp/section.md

      - name: Replace section in profile/README.md
        run: |
          python3 <<'PY'
          import re
          from pathlib import Path

          path = Path("profile/README.md")
          content = path.read_text()
          new_section = Path("/tmp/section.md").read_text().rstrip()

          updated, count = re.subn(
              r"<!-- recent-analyses:start -->.*?<!-- recent-analyses:end -->",
              lambda _: new_section,
              content,
              count=1,
              flags=re.DOTALL,
          )

          if count == 0:
              raise SystemExit("markers not found in profile/README.md")

          path.write_text(updated)
          PY

      - name: Commit if changed
        run: |
          if git diff --quiet profile/README.md; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name 'keepsecure-labs-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add profile/README.md
          git commit -m "chore: sync recent analyses from hub"
          git push
